<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yuichiro</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --text: #1f2933;
        --muted: #5f6c7b;
        --accent: #0f766e;
        --surface: #ffffff;
        --border: #d8dee6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.7;
      }

      main {
        width: min(100%, 720px);
        padding: 40px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1.1;
        font-weight: 700;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      @media (max-width: 520px) {
        main {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Yuichiro</h1>
      <p>
        GitHub Pagesで公開している個人サイトです。
        これから少しずつ内容を追加していきます。
      </p>
    </main>
  </body>
</html>
